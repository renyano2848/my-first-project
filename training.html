<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>視覚刺激トレーニング</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ════ メイン画面（色切替） ════ */
        #screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #111;
        }
        .color-name {
            font-size: clamp(4rem, 20vw, 10rem);
            font-weight: 900;
            color: rgba(255,255,255,.85);
            letter-spacing: .05em;
            text-shadow: 0 4px 32px rgba(0,0,0,.3);
        }
        .color-en {
            font-size: clamp(1rem, 4vw, 2rem);
            font-weight: 700;
            color: rgba(255,255,255,.45);
            letter-spacing: .4em;
            margin-top: 10px;
        }

        /* ════ 設定パネル ════ */
        #settings {
            position: fixed; inset: 0;
            background: #0a0a12;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 28px 24px; gap: 0;
            transition: opacity .25s;
        }
        #settings.hidden { opacity: 0; pointer-events: none; }

        .s-logo {
            font-size: .6rem; font-weight: 700; letter-spacing: .5em;
            text-transform: uppercase; color: #F5C842;
            margin-bottom: 12px;
        }
        .s-title {
            font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 900;
            color: #f2f2f8; text-align: center; line-height: 1.15;
            margin-bottom: 6px;
        }
        .s-sub { font-size: .82rem; color: #555; margin-bottom: 32px; }

        /* 速度選択 */
        .s-lbl {
            font-size: .58rem; font-weight: 700; letter-spacing: .45em;
            text-transform: uppercase; color: #444;
            margin-bottom: 10px; align-self: flex-start;
            width: 100%; max-width: 360px;
        }
        .speed-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; width: 100%; max-width: 360px; margin-bottom: 28px;
        }
        .sp {
            background: #16162a; border: 2px solid rgba(255,255,255,.07);
            border-radius: 14px; padding: 14px 6px; text-align: center;
            cursor: pointer; transition: border-color .2s, background .2s, transform .12s;
        }
        .sp.active { border-color: #F5C842; background: rgba(245,200,66,.1); }
        .sp:active  { transform: scale(.93); }
        .sp-val { font-size: 1.3rem; font-weight: 900; color: #f2f2f8; }
        .sp-lbl { font-size: .58rem; color: #555; margin-top: 3px; }

        /* 色選択 */
        .color-grid {
            display: flex; gap: 10px; width: 100%;
            max-width: 360px; margin-bottom: 32px; flex-wrap: wrap;
        }
        .cg {
            flex: 1; min-width: 80px;
            background: #16162a; border: 2px solid rgba(255,255,255,.07);
            border-radius: 14px; padding: 12px 6px; text-align: center;
            cursor: pointer; transition: border-color .2s, background .2s, transform .12s;
        }
        .cg.active { background: rgba(255,255,255,.08); }
        .cg:active  { transform: scale(.93); }
        .cg-dot { width: 28px; height: 28px; border-radius: 50%; margin: 0 auto 6px; }
        .cg-name { font-size: .65rem; font-weight: 700; color: #aaa; }

        .start-btn {
            width: 100%; max-width: 360px; padding: 20px; border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #16C34A, #22C55E);
            color: #fff; font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem; font-weight: 700; letter-spacing: .12em;
            cursor: pointer; box-shadow: 0 8px 32px rgba(34,197,94,.4);
            transition: transform .12s;
        }
        .start-btn:active { transform: scale(.97); }

        /* ════ 停止ボタン（プレイ中） ════ */
        #stopBtn {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            padding: 14px 40px; border: 1px solid rgba(255,255,255,.2);
            border-radius: 100px; background: rgba(0,0,0,.35);
            color: rgba(255,255,255,.6); font-family: 'Montserrat', sans-serif;
            font-size: .8rem; font-weight: 700; letter-spacing: .15em;
            cursor: pointer; backdrop-filter: blur(8px);
            display: none;
        }

        /* ════ カウントダウン ════ */
        #cdOverlay {
            position: fixed; inset: 0;
            background: #0a0a12;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity .2s;
        }
        #cdOverlay.show { opacity: 1; pointer-events: all; }
        .cd-num {
            font-size: clamp(5rem, 22vw, 9rem); font-weight: 900;
            background: linear-gradient(120deg, #22C55E, #3B82F6, #EF4444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: cdp .85s ease-in-out infinite;
        }
        @keyframes cdp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .cd-txt { font-size: .9rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<!-- メイン画面 -->
<div id="screen"></div>
<button id="stopBtn" onclick="stopTraining()">■ STOP</button>

<!-- カウントダウン -->
<div id="cdOverlay">
    <div class="cd-num" id="cdNum">3</div>
    <div class="cd-txt">準備して！</div>
</div>

<!-- 設定 -->
<div id="settings">
    <div class="s-logo">👁 Visual Stimulus Training</div>
    <h1 class="s-title">視覚刺激<br>トレーニング</h1>
    <p class="s-sub">画面いっぱいに色が切り替わります</p>

    <div class="s-lbl">— 切替スピード</div>
    <div class="speed-grid">
        <div class="sp" onclick="selSpeed(this,30000)">
            <div class="sp-val">30s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,20000)">
            <div class="sp-val">20s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,15000)">
            <div class="sp-val">15s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,10000)">
            <div class="sp-val">10s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,8000)">
            <div class="sp-val">8s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,5000)">
            <div class="sp-val">5s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp active" onclick="selSpeed(this,3000)">
            <div class="sp-val">3s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,2000)">
            <div class="sp-val">2s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,1000)">
            <div class="sp-val">1s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,500)">
            <div class="sp-val">0.5s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,300)">
            <div class="sp-val">0.3s</div>
            <div class="sp-lbl"></div>
        </div>
        <div class="sp" onclick="selSpeed(this,100)">
            <div class="sp-val">0.1s</div>
            <div class="sp-lbl"></div>
        </div>
    </div>

    <div class="s-lbl">— 使用する色</div>
    <div class="color-grid" id="colorGrid">
        <div class="cg active" data-color="green" onclick="toggleColor(this)">
            <div class="cg-dot" style="background:#22C55E;box-shadow:0 0 10px #22C55E88;"></div>
            <div class="cg-name">みどり</div>
        </div>
        <div class="cg active" data-color="blue" onclick="toggleColor(this)">
            <div class="cg-dot" style="background:#3B82F6;box-shadow:0 0 10px #3B82F688;"></div>
            <div class="cg-name">あお</div>
        </div>
        <div class="cg active" data-color="red" onclick="toggleColor(this)">
            <div class="cg-dot" style="background:#EF4444;box-shadow:0 0 10px #EF444488;"></div>
            <div class="cg-name">あか</div>
        </div>
        <div class="cg" data-color="yellow" onclick="toggleColor(this)">
            <div class="cg-dot" style="background:#F59E0B;box-shadow:0 0 10px #F59E0B88;"></div>
            <div class="cg-name">きいろ</div>
        </div>
    </div>

    <button class="start-btn" onclick="startCountdown()">START</button>
</div>

<script>
    const COLORS_MAP = {
        green:  { bg:'#16A34A', name:'みどり', en:'GREEN'  },
        blue:   { bg:'#2563EB', name:'あお',   en:'BLUE'   },
        red:    { bg:'#DC2626', name:'あか',   en:'RED'    },
        yellow: { bg:'#D97706', name:'きいろ', en:'YELLOW' },
    };

    let speed = 3000;
    let activeColors = ['green','blue','red'];
    let colorIndex = 0;
    let interval = null;
    let isRandom = true;

    function selSpeed(el, ms) {
        document.querySelectorAll('.sp').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        speed = ms;
    }

    function toggleColor(el) {
        const col = el.dataset.color;
        const isActive = el.classList.toggle('active');
        if (isActive) {
            if (!activeColors.includes(col)) activeColors.push(col);
        } else {
            activeColors = activeColors.filter(c => c !== col);
            // 最低1色は残す
            if (activeColors.length === 0) {
                activeColors.push(col);
                el.classList.add('active');
            }
        }
    }

    function startCountdown() {
        if (activeColors.length < 1) return;
        const cd = document.getElementById('cdOverlay');
        const num = document.getElementById('cdNum');
        cd.classList.add('show');
        let n = 3;
        num.textContent = n;
        const iv = setInterval(() => {
            n--;
            if (n === 0) {
                num.textContent = 'GO!';
                clearInterval(iv);
                setTimeout(() => { cd.classList.remove('show'); beginTraining(); }, 500);
            } else {
                num.textContent = n;
            }
        }, 900);
    }

    let nextTime = 0;

    function beginTraining() {
        document.getElementById('settings').classList.add('hidden');
        document.getElementById('stopBtn').style.display = 'block';
        running = true;
        showColor();
        nextTime = performance.now() + speed;
        loop();
    }

    function showColor() {
        // ランダムに選ぶ（同じ色が連続しないよう工夫）
        let cols = [...activeColors];
        if (cols.length > 1) cols = cols.filter(c => c !== lastColor);
        const col = cols[Math.floor(Math.random() * cols.length)];
        lastColor = col;

        const c = COLORS_MAP[col];
        const s = document.getElementById('screen');
        s.style.backgroundColor = c.bg;
    }
    let lastColor = '';
    let rafId = null;
    let running = false;

    function loop() {
        if (!running) return;
        const now = performance.now();
        if (now >= nextTime) {
            showColor();
            nextTime += speed;
        }
        rafId = requestAnimationFrame(loop);
    }

    function stopTraining() {
        running = false;
        cancelAnimationFrame(rafId);
        document.getElementById('screen').style.backgroundColor = '#111';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('settings').classList.remove('hidden');
    }
</script>
</body>
</html>
